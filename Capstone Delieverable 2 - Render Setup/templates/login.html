<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login</title>

    <!-- External CSS for login page styling -->
    <link rel="stylesheet" href="{{ url_for('static', filename='css/login.css') }}">
    <!-- Font Awesome icons (social login icons) -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.1/css/all.min.css">
</head>

<body>

<!-- Main login container centered on screen -->
<div class="login-container">
    <!-- Login form sending POST request to Flask login route -->
    <form method="POST" action="{{ url_for('login') }}" class="login-form">

        <!-- Page title -->
        <h1>Login</h1>

        <!-- Error message display (from Flask backend if login fails) -->
        {% if error %}
        <p style="color:red; text-align:center; margin-bottom:10px;">
            {{ error }}
        </p>
        {% endif %}

        <!-- Social icons -->
        <div class="social-icons">
            <a href="#" class="icon"><i class="fa-brands fa-apple"></i></a>
            <a href="#" class="icon"><i class="fa-brands fa-google"></i></a>
            <a href="#" class="icon"><i class="fa-brands fa-yahoo"></i></a>
        </div>

        <!-- Section label -->
        <span>Login with Email</span>

        <!-- Email input field -->
        <input type="email" name="email" placeholder="Email" required>
        <!-- Password input field -->
        <input type="password" name="password" placeholder="Password" required>

        <!-- Forgot password -->
        <a href="#">Forgot your password?</a>

        <!-- Submit login button -->
        <button type="submit">Sign In</button>

        <!-- Link to signup page -->
        <p class="signup-link">
            Don't have an account?
            <a href="/signup">Create one</a>
        </p>

    </form>
</div>

<script src="{{ url_for('static', filename='js/login.js') }}"></script>

</body>
</html>
